name: Pipeline de Seguridad (Semgrep, Trivy y Gitleaks)

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches: ["master", "main"]

jobs:
  semgrep_scan:
    name: Análisis SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    if: (github.actor != 'dependabot[bot]')
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ejecuta el escaneo y guarda los resultados en el archivo semgrep-results.sarif
      - name: Perform Semgrep Analysis
        run: |
          semgrep scan --config auto --sarif . > semgrep-results.sarif || true

      # Agrupa el archivo en un .zip descargable compatible con GitHub v4
      - name: Save SARIF results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semgrep-sast
          path: semgrep-results.sarif

sca_trivy:
    name: Análisis SCA (Trivy - Vulnerabilidades en Dependencias)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Configurar Node.js e instalar dependencias para que existan en el entorno
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 2. Descargamos físicamente las dependencias
      - name: Instalar dependencias del proyecto
        run: |
          npm install --legacy-peer-deps || true

      # 3. Ejecutar Trivy usando la acción oficial pero configurada para dependencias (fs)
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'              # CORREGIDO: 'fs' en lugar de 'config' para buscar vulnerabilidades (SCA)
          scan-ref: '.'                # Obliga a buscar en la raíz del proyecto actual
          scanners: 'vuln'             # Se enfoca solo en fallos de librerías y software
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          format: 'table'
          output: 'trivy.txt'          # Guarda el resultado en este archivo de texto

      # 4. Publicar la tabla de resultados de forma elegante en el resumen de GitHub Actions
      - name: Publish Trivy Output to Summary
        run: |
          if [[ -s trivy.txt ]]; then
            {
              echo "### 🛡️ Reporte de Seguridad SCA (Trivy)"
              echo "A continuación se detallan las vulnerabilidades detectadas en las dependencias del proyecto:"
              echo "<details><summary>📦 Haz clic aquí para desplegar la tabla de vulnerabilidades</summary>"
              echo ""
              echo '```text'
              cat trivy.txt
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          fi

  secret_detection:
    name: Detección de Secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0 

      - name: Ejecutar Gitleaks en archivos locales
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --no-git --verbose || true