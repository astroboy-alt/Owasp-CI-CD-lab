name: Pipeline de Seguridad (Semgrep, Trivy y Gitleaks)

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches: ["master", "main"]

jobs:
  semgrep_scan:
    name: Análisis SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar entorno de Semgrep
        run: |
          pip install semgrep

      # Ejecutar Semgrep guardando el output legible en un archivo .txt
      - name: Run Semgrep Scan
        run: |
          semgrep scan --config=auto --text --output=semgrep_results.txt || true

      # Publicar en el Dashboard
      - name: Publish Semgrep Output to Summary
        if: always()
        run: |
          if [[ -s semgrep_results.txt ]]; then
            {
              echo "### 🔍 Reporte de Seguridad SAST (Semgrep)"
              echo "A continuación se detallan las vulnerabilidades estáticas detectadas en el código fuente:"
              echo "<details><summary>💻 Haz clic aquí para desplegar el análisis de código</summary>"
              echo ""
              echo '```text'
              cat semgrep_results.txt
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          fi

  sca_trivy:
    name: Análisis SCA (Trivy - Vulnerabilidades en Dependencias)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # Baja la rama exacta donde estás haciendo push

      # 1. Configurar el entorno de Node.js necesario para mapear las dependencias
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 2. Descargar e instalar las librerías físicamente en el disco virtual
      - name: Instalar dependencias del proyecto
        run: |
          npm install --legacy-peer-deps || true

      # 3. CORREGIDO SEGÚN EL README: Configuración explícita de scan-type y scan-ref
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'           # Especifica que busque en el sistema de archivos
          scan-ref: '.'             # CORRECCIÓN CLAVE: Obliga a Trivy a mirar la raíz actual del proyecto
          format: 'table'
          scanners: 'vuln'          # Se enfoca únicamente en las dependencias de software
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          exit-code: '0'            # Permite continuar para que se genere tu reporte en el summary
          output: 'trivy.txt'       # Almacena el resultado para el dashboard

      # 4. Formato integrado: Tomar el archivo txt e inyectarlo dentro del Summary de GitHub
      - name: Publish Trivy Output to Summary
        if: always()
        run: |
          if [[ -s trivy.txt ]]; then
            {
              echo "### 🛡️ Reporte de Seguridad SCA (Trivy)"
              echo "A continuación se detallan las vulnerabilidades detectadas en las dependencias del proyecto:"
              echo "<details><summary>📦 Haz clic aquí para desplegar la tabla de vulnerabilidades</summary>"
              echo ""
              echo '```text'
              cat trivy.txt
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "### ⚠️ Reporte de Seguridad SCA (Trivy)"
              echo "No se generó el reporte 'trivy.txt' o el archivo está completamente vacío."
            } >> $GITHUB_STEP_SUMMARY
          fi
  secret_detection:
    name: Detección de Secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0 

      # Tu método original que sí detecta, guardando el resultado en gitleaks_results.txt
      - name: Ejecutar Gitleaks en archivos locales
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --no-git --verbose > gitleaks_results.txt || true

      # Inyectar tu reporte detectado en el Summary de GitHub
      - name: Publicar resultados de Gitleaks en el Summary
        if: always()
        run: |
          if [[ -s gitleaks_results.txt ]]; then
            {
              echo "### 🔑 Reporte de Credenciales Expuestas (Gitleaks)"
              echo "Se han detectado posibles llaves expuestas o contraseñas en los archivos locales:"
              echo "<details><summary>🔓 Haz clic aquí para desplegar el reporte de secretos</summary>"
              echo ""
              echo '```text'
              cat gitleaks_results.txt
              echo '```'
              echo "</details>"
              echo ""
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "### ✅ Reporte de Credenciales Expuestas (Gitleaks)"
              echo "No se detectaron secretos expuestos en los archivos locales."
              echo ""
            } >> $GITHUB_STEP_SUMMARY
          fi