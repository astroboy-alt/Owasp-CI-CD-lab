name: Pipeline de Seguridad (Semgrep, Trivy y Gitleaks)

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches: ["master", "main"]

jobs:
  semgrep_scan:
    name: Análisis SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    if: (github.actor != 'dependabot[bot]')
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ejecuta el escaneo y guarda los resultados en el archivo semgrep-results.sarif
      - name: Perform Semgrep Analysis
        run: |
          semgrep scan --config auto --sarif . > semgrep-results.sarif || true

      # Agrupa el archivo en un .zip descargable compatible con GitHub v4
      - name: Save SARIF results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semgrep-sast
          path: semgrep-results.sarif

  sca_trivy:
    name: Análisis SCA (Trivy - Vulnerabilidades en Dependencias)
    runs-on: ubuntu-latest

    steps:
      # 1. CORREGIDO: Forzar a GitHub a descargar la rama exacta donde tienes el código real
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master  # Obliga a descargar la rama 'master' explícitamente

      # 2. PASO DE DIAGNÓSTICO: Ver qué archivos hay realmente en el servidor
      - name: Verificar archivos descargados en el runner
        run: |
          echo "=== Listando archivos en la raíz ==="
          ls -la
          echo "=== Verificando si existe package.json ==="
          find . -name "package.json"

      # 3. Configurar el entorno de Node.js necesario
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 4. Descargar e instalar las librerías físicamente
      - name: Instalar dependencias del proyecto
        run: |
          npm install --legacy-peer-deps || true

      # 5. Instalación oficial mediante APT
      - name: Instalar Trivy de forma nativa vía APT
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # 6. Ejecutar escaneo sobre el archivo de bloqueo generado por npm install
      - name: Ejecutar escaneo profundo de dependencias (SCA)
        run: |
          trivy fs --scanners vuln --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --format table --output trivy.txt .

      # 7. Publicar la tabla real en el resumen de GitHub Actions
      - name: Publish Trivy Output to Summary
        run: |
          if [[ -s trivy.txt ]]; then
            {
              echo "### 🛡️ Reporte de Seguridad SCA (Trivy)"
              echo "A continuación se detallan las vulnerabilidades detectadas en las dependencias del proyecto:"
              echo "<details><summary>📦 Haz clic aquí para desplegar la tabla de vulnerabilidades</summary>"
              echo ""
              echo '```text'
              cat trivy.txt
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Error en el Reporte" >> $GITHUB_STEP_SUMMARY
            echo "Trivy no generó hallazgos en el archivo de texto." >> $GITHUB_STEP_SUMMARY
          fi

  secret_detection:
    name: Detección de Secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0 

      - name: Ejecutar Gitleaks en archivos locales
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --no-git --verbose || true