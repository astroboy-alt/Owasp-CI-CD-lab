name: Pipeline de Seguridad (Semgrep, Trivy y Gitleaks)

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches: ["master", "main"]

jobs:
  semgrep_scan:
    name: Análisis SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    if: (github.actor != 'dependabot[bot]')
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ejecuta el escaneo y guarda los resultados en el archivo semgrep-results.sarif
      - name: Perform Semgrep Analysis
        run: |
          semgrep scan --config auto --sarif . > semgrep-results.sarif || true

      # Agrupa el archivo en un .zip descargable compatible con GitHub v4
      - name: Save SARIF results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semgrep-sast
          path: semgrep-results.sarif

  sca_trivy:
    name: Análisis SCA (Trivy - Vulnerabilidades en Dependencias)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }} # Se asegura de bajar la rama actual en la que haces push

      # 1. Configurar el entorno de Node.js necesario para mapear las dependencias
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 2. Descargar e instalar las librerías físicamente en el disco virtual
      - name: Instalar dependencias del proyecto
        run: |
          npm install --legacy-peer-deps || true

      # 3. Formato integrado: Ejecutar Trivy guardando la salida en formato tabla en un archivo txt
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nc-fttx-portal:scan'
          format: 'table'
          exit-code: '1'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          output: 'trivy.txt' # Aquí se captura todo el output de la tabla

      # 4. Formato integrado: Tomar el archivo txt e inyectarlo dentro del Summary de GitHub
      - name: Publish Trivy Output to Summary
        if: always() # Se ejecuta aunque Trivy encuentre fallas o marque advertencias
        run: |
          if [[ -s trivy.txt ]]; then
            {
              echo "### 🛡️ Reporte de Seguridad SCA (Trivy)"
              echo "A continuación se detallan las vulnerabilidades detectadas en las dependencias del proyecto:"
              echo "<details><summary>📦 Haz clic aquí para desplegar la tabla de vulnerabilidades</summary>"
              echo ""
              echo '```text'
              cat trivy.txt
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "### ⚠️ Reporte de Seguridad SCA (Trivy)"
              echo "No se generó el reporte 'trivy.txt' o el archivo está completamente vacío."
            } >> $GITHUB_STEP_SUMMARY
          fi

  secret_detection:
    name: Detección de Secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0 

      - name: Ejecutar Gitleaks en archivos locales
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --no-git --verbose || true