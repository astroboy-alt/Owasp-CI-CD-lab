name: Pipeline de Seguridad (Semgrep, Trivy y Gitleaks)

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches: ["master", "main"]

jobs:
  semgrep_scan:
    name: Análisis SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    if: (github.actor != 'dependabot[bot]')
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ejecuta el escaneo y guarda los resultados en el archivo semgrep-results.sarif
      - name: Perform Semgrep Analysis
        run: |
          semgrep scan --config auto --sarif . > semgrep-results.sarif || true

      # Agrupa el archivo en un .zip descargable compatible con GitHub v4
      - name: Save SARIF results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semgrep-sast
          path: semgrep-results.sarif

  sca_trivy:
    name: Análisis SCA (Trivy - Vulnerabilidades en Dependencias)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Configurar el entorno de Node.js necesario para mapear las dependencias
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 2. Descargar e instalar las librerías viejas físicamente en el disco virtual
      - name: Instalar dependencias del proyecto
        run: |
          npm install --legacy-peer-deps || true

      # 3. Descargar el binario portátil directo (evita problemas de contenedores y permisos)
      - name: Descargar Trivy Binario Portátil
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.51.1/trivy_0.51.1_Linux-64bit.tar.gz
          tar -zxvf trivy_0.51.1_Linux-64bit.tar.gz

      # 4. Ejecución nativa local apuntando a la carpeta raíz actual (.)
      - name: Ejecutar escaneo profundo de dependencias (SCA)
        run: |
          ./trivy fs --scanners vuln --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --format table .

  secret_detection:
    name: Detección de Secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0 

      - name: Ejecutar Gitleaks en archivos locales
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --no-git --verbose || true