name: Pipeline de Seguridad (Semgrep, Trivy y Gitleaks)

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches: ["master", "main"]

jobs:
  semgrep_scan:
    name: Análisis SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    if: (github.actor != 'dependabot[bot]')
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Ejecuta el escaneo y guarda los resultados en el archivo semgrep-results.sarif
      - name: Perform Semgrep Analysis
        run: |
          semgrep scan --config auto --sarif . > semgrep-results.sarif || true

      # Agrupa el archivo en un .zip descargable compatible con GitHub v4
      - name: Save SARIF results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semgrep-sast
          path: semgrep-results.sarif

  sca_trivy:
    name: Análisis SCA (Trivy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Levantar Node.js es fundamental para que se reconozca el ecosistema de dependencias
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Instalamos absolutamente todas las dependencias del package.json para crear la carpeta node_modules
      - name: Instalar dependencias del proyecto
        run: |
          npm install --legacy-peer-deps || true

      # Ejecución recomendada por la documentación oficial cuando no se usa Code Scanning integrado
      # Usamos una versión ultra estable de la acción oficial (0.20.0) para evitar fallos de inicialización
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln' # Enfocado EXCLUSIVAMENTE en vulnerabilidades de dependencias (SCA)
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL' # Forzamos a que salgan TODAS las severidades
          format: 'table' # Te genera la tabla detallada directamente en la consola de GitHub Actions

  secret_detection:
    name: Detección de Secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0 

      - name: Ejecutar Gitleaks en archivos locales
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz
          ./gitleaks detect --no-git --verbose || true