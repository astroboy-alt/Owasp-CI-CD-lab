name: Pipeline de Seguridad (Semgrep, Dependabot y Gitleaks)

on:
  pull_request: {}
  workflow_dispatch: {}
  push:
    branches: ["master", "main"]

jobs:
  semgrep_scan:
    name: Análisis SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar entorno de Semgrep
        run: |
          pip install semgrep

      # Ejecutar Semgrep guardando el output legible en un archivo .txt
      - name: Run Semgrep Scan
        run: |
          semgrep scan --config=auto --text --output=semgrep_results.txt || true

      # Publicar en el Dashboard
      - name: Publish Semgrep Output to Summary
        if: always()
        run: |
          if [[ -s semgrep_results.txt ]]; then
            {
              echo "### 🔍 Reporte de Seguridad SAST (Semgrep)"
              echo "A continuación se detallan las vulnerabilidades estáticas detectadas en el código fuente:"
              echo "<details><summary>💻 Haz clic aquí para desplegar el análisis de código</summary>"
              echo ""
              echo '```text'
              cat semgrep_results.txt
              echo '```'
              echo "</details>"
            } >> $GITHUB_STEP_SUMMARY
          fi

  secret_detection:
    name: Detección de Secretos (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4 
        with:
          fetch-depth: 0 # OBLIGATORIO: Baja el historial de commits para que Gitleaks analice de forma nativa y rápida

      # Descargamos el ejecutable oficial
      - name: Descargar e instalar Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz
          tar -zxvf gitleaks_8.18.2_linux_x64.tar.gz

      # EJECUCIÓN RECOMENDADA: Escaneo nativo por historial (sin --no-git) enfocado en tu repositorio
      - name: Ejecutar Gitleaks nativo en el historial
        run: |
          # Usamos 'detect' de forma nativa. Es ultra rápido porque lee la base de datos de Git, ignorando node_modules
          ./gitleaks detect --verbose > gitleaks_results.txt || true

      # Inyectar el reporte en tu formato de Dashboard desplegable
      - name: Publicar resultados de Gitleaks en el Summary
        if: always()
        run: |
          if [[ -s gitleaks_results.txt ]]; then
            {
              echo "### 🔑 Reporte de Credenciales Expuestas (Gitleaks)"
              echo "Se han detectado posibles llaves expuestas, secretos o contraseñas en el historial del proyecto:"
              echo "<details><summary>🔓 Haz clic aquí para desplegar el reporte de secretos</summary>"
              echo ""
              echo '```text'
              cat gitleaks_results.txt
              echo '```'
              echo "</details>"
              echo ""
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "### ✅ Reporte de Credenciales Expuestas (Gitleaks)"
              echo "No se detectaron secretos expuestos en el historial de la rama."
              echo ""
            } >> $GITHUB_STEP_SUMMARY
          fi